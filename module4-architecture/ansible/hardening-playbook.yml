---
# ================================================
# Ansible Hardening Playbook
# Author: Hussain
# Standard: CIS Benchmark, GDPR Article 32,
#           ISO27001 A.12.6, PCI-DSS Req 2
# Purpose: Automatically harden Linux servers
#          after deployment
# ================================================

- name: Server Hardening Playbook
  hosts: all
  become: true
  vars:
    ssh_port: 22
    max_auth_tries: 3
    password_max_days: 90
    password_min_days: 7

  tasks:

  # ---- SECTION 1: System Updates ----
  - name: Update all system packages
    apt:
      update_cache: yes
      upgrade: safe
    ignore_errors: yes
    tags: [updates, cis-1.9]

  # ---- SECTION 2: SSH Hardening ----
  - name: Disable root SSH login
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^PermitRootLogin'
      line: 'PermitRootLogin no'
      state: present
    notify: restart sshd
    tags: [ssh, cis-5.2.8]

  - name: Disable SSH password authentication
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^PasswordAuthentication'
      line: 'PasswordAuthentication no'
      state: present
    notify: restart sshd
    tags: [ssh, cis-5.2.12]

  - name: Set SSH max authentication tries
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^MaxAuthTries'
      line: 'MaxAuthTries {{ max_auth_tries }}'
      state: present
    notify: restart sshd
    tags: [ssh, cis-5.2.7]

  - name: Disable SSH X11 forwarding
    lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^X11Forwarding'
      line: 'X11Forwarding no'
      state: present
    notify: restart sshd
    tags: [ssh, cis-5.2.6]

  # ---- SECTION 3: Firewall Configuration ----
  - name: Install UFW firewall
    apt:
      name: ufw
      state: present
    ignore_errors: yes
    tags: [firewall, cis-3.5]

  - name: Deny all incoming traffic by default
    ufw:
      default: deny
      direction: incoming
    ignore_errors: yes
    tags: [firewall, cis-3.5]

  - name: Allow SSH through firewall
    ufw:
      rule: allow
      port: '22'
      proto: tcp
    ignore_errors: yes
    tags: [firewall]

  - name: Allow HTTPS through firewall
    ufw:
      rule: allow
      port: '443'
      proto: tcp
    ignore_errors: yes
    tags: [firewall]

  - name: Enable UFW firewall
    ufw:
      state: enabled
    ignore_errors: yes
    tags: [firewall, cis-3.5]

  # ---- SECTION 4: Audit Logging ----
  - name: Install auditd logging service
    apt:
      name: auditd
      state: present
    ignore_errors: yes
    tags: [audit, iso27001-A.12.4]

  - name: Enable auditd service
    service:
      name: auditd
      state: started
      enabled: yes
    ignore_errors: yes
    tags: [audit, iso27001-A.12.4]

  - name: Audit all login attempts
    lineinfile:
      path: /etc/audit/audit.rules
      line: '-w /var/log/auth.log -p wa -k authentication'
      create: yes
    ignore_errors: yes
    tags: [audit, gdpr-article-32]

  - name: Audit privileged commands
    lineinfile:
      path: /etc/audit/audit.rules
      line: '-a always,exit -F arch=b64 -S execve -F euid=0 -k privileged'
      create: yes
    ignore_errors: yes
    tags: [audit, pci-dss-req-10]

  # ---- SECTION 5: Password Policy ----
  - name: Set password maximum age
    lineinfile:
      path: /etc/login.defs
      regexp: '^PASS_MAX_DAYS'
      line: 'PASS_MAX_DAYS {{ password_max_days }}'
    tags: [password, cis-5.4.1]

  - name: Set password minimum age
    lineinfile:
      path: /etc/login.defs
      regexp: '^PASS_MIN_DAYS'
      line: 'PASS_MIN_DAYS {{ password_min_days }}'
    tags: [password, cis-5.4.1]

  # ---- SECTION 6: Disable Unnecessary Services ----
  - name: Disable telnet service
    service:
      name: telnet
      state: stopped
      enabled: no
    ignore_errors: yes
    tags: [services, cis-2.1]

  - name: Disable FTP service
    service:
      name: vsftpd
      state: stopped
      enabled: no
    ignore_errors: yes
    tags: [services, cis-2.1]

  # ---- SECTION 7: File Permissions ----
  - name: Set secure permissions on passwd file
    file:
      path: /etc/passwd
      owner: root
      group: root
      mode: '0644'
    tags: [permissions, cis-6.1.2]

  - name: Set secure permissions on shadow file
    file:
      path: /etc/shadow
      owner: root
      group: root
      mode: '0640'
    tags: [permissions, cis-6.1.3]

  handlers:
  - name: restart sshd
    service:
      name: sshd
      state: restarted
    ignore_errors: yes
